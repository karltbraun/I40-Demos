# =============================================================================
# Mosquitto MQTT Broker Configuration — I40 Demo
# =============================================================================

# --- Listener ---
# Bind to all interfaces so all containers (and external tools) can connect
listener 1883 0.0.0.0

# --- Authentication ---
# Anonymous access enabled for demo purposes
# For production: configure password_file and/or TLS
allow_anonymous true

# --- Persistence ---
# Retained messages and client sessions survive broker restarts
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
