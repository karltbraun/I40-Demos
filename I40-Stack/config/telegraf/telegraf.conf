# =============================================================================
# Telegraf Configuration — I40 Demo
# Pipeline: Mosquitto (MQTT) → Telegraf → InfluxDB 3
#
# This demonstrates the zero-config MQTT → InfluxDB path alongside Node-RED.
# Both consume from the same MQTT broker; compare the approaches in the demo.
# =============================================================================

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

# =============================================================================
# INPUT: Subscribe to all I40 topics on the Mosquitto broker
# =============================================================================
[[inputs.mqtt_consumer]]
  # Mosquitto is reachable by container name on the i40-demo-net network
  servers = ["tcp://mosquitto:1883"]

  # Subscribe to all topics under the configured root (default: i40/#)
  # Adjust MQTT_TOPIC_ROOT in .env to match your topic structure
  topics = ["${MQTT_TOPIC_ROOT}/#"]

  # Client ID — unique per consumer
  client_id = "telegraf-i40-demo"

  # QoS 1 ensures at-least-once delivery
  qos = 1

  # Expect JSON payloads — common for IIoT sensors and simulators
  # For Sparkplug B payloads, change to: data_format = "sparkplug_b"
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    # Store the MQTT topic as a tag for easy filtering in InfluxDB
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "@this"
      rename = "topic"
      type = "string"
      optional = true

    # Parse all numeric fields from the JSON payload
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "@this"
      type = "float"
      optional = true

# =============================================================================
# INPUT: LineFeed Simulator — NewCo UNS topics
# Payloads: {"value": <number>} for numeric, {"value": "<string>"} for labels
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["NewCo/#"]
  client_id = "telegraf-linefeed"
  qos = 1
  topic_tag = "topic"
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    # Numeric topics → float field "value"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"
      optional = true
      rename = "value"

    # String topics (e.g. StateLabel) → string field "value_str"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "string"
      optional = true
      rename = "value_str"

# =============================================================================
# OUTPUT: Write to InfluxDB 3 Core via the v2-compatible write API
# InfluxDB 3 Core accepts writes on /api/v2/write with any token value
# =============================================================================
[[outputs.influxdb_v2]]
  # InfluxDB is reachable by container name on the i40-demo-net network
  urls = ["http://influxdb:8181"]

  # InfluxDB 3 Core does not enforce token auth in default configuration
  # Set INFLUXDB_TOKEN in .env if auth is enabled
  token = "${INFLUXDB_TOKEN}"

  # Organization is not used in InfluxDB 3 Core (leave empty)
  organization = ""

  # Target database (mapped from "bucket" in the v2 API)
  bucket = "${INFLUXDB_DATABASE}"
